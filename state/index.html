<!DOCTYPE html>
<html>
  <body>
    <div id="root"></div>
  </body>
  <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const root = document.getElementById("root");
    function App() {
      const [amount, setAmount] = React.useState(0);
      const [flipped, setFlipped] = React.useState(false);
      const onChange = (event) => {
        setAmount(event.target.value);
      };
      const reset = () => setAmount(0);
      const onFlip = () => {
        reset();
        setFlipped(!flipped);
      };
      return (
        <div>
          <h1>Super Converter</h1>
          <div>
            <label for="miunutes">Minutes</label>
            <input value={flipped ? amount * 60 : amount} id="miunutes" type="number" placeholder="Minutes" onChange={onChange} disabled={flipped} />
          </div>
          <br />
          <div>
            <label for="hours">Hours</label>
            <input value={flipped ? amount : Math.round(amount / 60)} id="hours" type="number" placeholder="Hours" onChange={onChange} disabled={!flipped} />
          </div>
          <button onClick={reset}>Reset</button>
          <button onClick={onFlip}>Flipped</button>
        </div>
      );
    }
    ReactDOM.render(<App />, root);
  </script>
</html>
