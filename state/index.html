<!DOCTYPE html>
<html>
  <body>
    <div id="root"></div>
  </body>
  <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    function MinutesToHours() {
      const [amount, setAmount] = React.useState(0);
      const [inverted, setInverted] = React.useState(false);
      const onChange = (event) => {
        setAmount(event.target.value);
      };
      const reset = () => setAmount(0);
      const onInverted = () => {
        reset();
        setInverted(!inverted);
      };
      return (
        <div>
          <div>
            <label for="miunutes">Minutes</label>
            <input value={inverted ? amount * 60 : amount} id="miunutes" type="number" placeholder="Minutes" onChange={onChange} disabled={inverted} />
          </div>
          <br />
          <div>
            <label for="hours">Hours</label>
            <input value={inverted ? amount : Math.round(amount / 60)} id="hours" type="number" placeholder="Hours" onChange={onChange} disabled={!inverted} />
          </div>
          <button onClick={reset}>Reset</button>
          <button onClick={onInverted}>{inverted ? "Turn back" : "Invert"}</button>
        </div>
      );
    }
    function KmToMiles() {
      const [amount, setAmount] = React.useState(0);
      const [inverted, setInverted] = React.useState(false);
      const onChange = (event) => {
        setAmount(event.target.value);
      };
      const reset = () => setAmount(0);
      const onInverted = () => {
        reset();
        setInverted(!inverted);
      };
      return (
        <div>
          <div>
            <label for="km">Km</label>
            <input value={inverted ? amount * 1.609 : amount} id="km" type="number" placeholder="Kilometer" onChange={onChange} disabled={inverted} />
          </div>
          <br />
          <div>
            <label for="miles">Miles</label>
            <input value={inverted ? amount : amount / 1.609} id="miles" type="number" placeholder="Miles" onChange={onChange} disabled={!inverted} />
          </div>
          <button onClick={reset}>Reset</button>
          <button onClick={onInverted}>{inverted ? "Turn back" : "Invert"}</button>
        </div>
      );
    }
    function App() {
      const [index, setIndex] = React.useState("xx");
      const onSelect = (e) => {
        setIndex(e.target.value);
      };
      return (
        <div>
          <h1>Super Converter</h1>
          <select value={index} onChange={onSelect}>
            <option value="xx">Select your units</option>
            <option value="0">Minutes & Hours</option>
            <option value="1">Km & Miles</option>
          </select>
          <hr />
          {index === "xx" ? "Please select your units" : null}
          {index === "0" ? <MinutesToHours /> : null}
          {index === "1" ? <KmToMiles /> : null}
        </div>
      );
    }
    const root = document.getElementById("root");
    ReactDOM.render(<App />, root);
  </script>
</html>
